<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>thefem.ru chat</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f0e8;
        --panel: #fffaf4;
        --ink: #1f1c18;
        --muted: #65584d;
        --accent: #b44b2a;
        --accent-soft: #f2d6c9;
        --line: #e8d7c8;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Georgia, "Iowan Old Style", "Times New Roman", serif;
        background:
          radial-gradient(circle at top left, #fff9f1 0%, transparent 35%),
          linear-gradient(160deg, #f7f0e8 0%, #efe3d5 100%);
        color: var(--ink);
      }
      .page {
        max-width: 980px;
        margin: 0 auto;
        min-height: 100vh;
        padding: 32px 20px 64px;
      }
      .hero {
        margin-bottom: 24px;
      }
      .hero h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 4vw, 3.5rem);
        line-height: 0.95;
      }
      .hero p {
        margin: 0;
        max-width: 680px;
        color: var(--muted);
        font-size: 1.05rem;
      }
      .grid {
        display: grid;
        gap: 20px;
        grid-template-columns: 320px 1fr;
      }
      .card {
        background: rgba(255, 250, 244, 0.92);
        border: 1px solid var(--line);
        border-radius: 22px;
        box-shadow: 0 18px 50px rgba(95, 54, 29, 0.08);
        padding: 20px;
      }
      .card h2 {
        margin: 0 0 14px;
        font-size: 1.1rem;
      }
      .muted {
        color: var(--muted);
      }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 0.95rem;
      }
      .messages {
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-height: 360px;
        max-height: 60vh;
        overflow: auto;
        padding-right: 4px;
      }
      .bubble {
        border-radius: 18px;
        padding: 12px 14px;
        border: 1px solid var(--line);
        white-space: pre-wrap;
      }
      .bubble.user {
        background: #f8e1d1;
        align-self: flex-end;
      }
      .bubble.assistant {
        background: #fff;
        align-self: flex-start;
      }
      .label {
        display: block;
        margin-bottom: 8px;
        font-size: 0.95rem;
      }
      input, textarea, button {
        font: inherit;
      }
      input, textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 12px 14px;
        background: #fff;
      }
      textarea {
        min-height: 120px;
        resize: vertical;
      }
      .actions {
        display: flex;
        gap: 12px;
        margin-top: 12px;
        flex-wrap: wrap;
      }
      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        background: var(--accent);
        color: white;
        cursor: pointer;
      }
      button[disabled] {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .ghost {
        background: transparent;
        color: var(--accent);
        border: 1px solid var(--accent-soft);
      }
      .error {
        color: #9c1f16;
      }
      @media (max-width: 840px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/app.js"></script>
  </body>
  </html>
